[workspace]
authors = ["Payman Tohidifar <payman.tohidifar@gmail.com>"]
channels = ["conda-forge"]
name = "mlsc"
platforms = ["linux-64", "osx-arm64", "win-64"]
version = "1.0.0"

[environments]
default = { features = ["base", "ml"], no-default-feature = true }

[feature.base.dependencies]
python = "3.11.*"
numpy = ">=2.1.0"      
pandas = ">=3.0.2"     
matplotlib = ">=3.10.0"
seaborn = ">=0.13.2"
jupyterlab = ">=4.3.5"
pixi-kernel = "*"

[feature.ml.dependencies]
scipy = ">=1.13.0"     
scikit-learn = ">=1.5.0" 
xgboost = ">=2.1.0"

